services:
  postgres:
    image: postgres:16-alpine
    container_name: meowsql-e2e-postgres
    environment:
      POSTGRES_USER: meowsql
      POSTGRES_PASSWORD: meowsql
      POSTGRES_DB: meowsql
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meowsql -d meowsql"]
      interval: 1s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.0
    container_name: meowsql-e2e-mysql
    environment:
      MYSQL_ROOT_PASSWORD: meowsql
      MYSQL_DATABASE: meowsql
      MYSQL_USER: meowsql
      MYSQL_PASSWORD: meowsql
    ports:
      - "53306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --local-infile=1
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umeowsql -pmeowsql --silent"]
      interval: 2s
      timeout: 3s
      retries: 30
